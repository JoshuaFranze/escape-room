<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select: none;">
<title>Het Verenigd Koninkrijk der Nederlanden</title>
<style>
  :root { 
    --primary: #2980b9; --secondary: #e74c3c; --success: #27ae60; --dark: #2c3e50; --gray: #dfe6e9;
  }
  
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f39c12; margin: 0; padding: 10px; color: var(--dark); touch-action: manipulation; }
  .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  h1, h2 { text-align: center; margin-top: 0; font-size: 1.5rem; }
  .section { display: none; animation: fadeIn 0.4s; }
  .active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* --- KAART OPDRACHT --- */
  .map-container { 
    position: relative; 
    width: 100%; 
    max-width: 450px; 
    aspect-ratio: 450 / 550; /* Zorgt dat de verhouding altijd klopt */
    margin: 20px auto;
    background: url('img/kaart-vkn.jpg') no-repeat center/contain;
    background-color: #dcf1f9; border: 4px solid var(--dark); border-radius: 12px;
  }

  /* De vakjes op de kaart (Slepen op desktop, Dropdown op mobiel) */
  .map-slot-box { 
    position: absolute; 
    width: 28%; /* Relatief aan de kaartbreedte */
    height: 8%; 
    display: flex; align-items: center; justify-content: center;
  }

  /* Posities in procenten zodat ze altijd op de juiste plek op de kaart staan */
  #pos-Nederland { top: 25%; left: 36%; }
  #pos-Belgie { top: 60%; left: 15%; }
  #pos-Luxemburg { top: 78%; left: 55%; }

  .map-select { 
    width: 100%; height: 100%; border-radius: 5px; border: 2px solid var(--primary); 
    font-size: 10px; background: rgba(255,255,255,0.9); display: none; 
  }

  /* --- MEDIA QUERIES --- */
  @media (max-width: 600px) {
    .geografisch-slot { display: none !important; } /* Verberg sleepvakjes */
    .map-select { display: block; } /* Toon dropdowns */
    .map-bank-wrapper { display: none; } /* Verberg de bank met sleepwoorden */
    .dropzone-container { flex-direction: column; align-items: center; }
    .slot { width: 100%; max-width: 280px; }
  }

  /* --- DRAG & DROP & LABELS --- */
  .item-bank { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; min-height: 80px; padding: 15px; background: #ecf0f1; border-radius: 12px; border: 2px solid #bdc3c7; }
  .draggable { padding: 10px 14px; background: var(--primary); color: white; border-radius: 8px; cursor: grab; font-weight: bold; font-size: 13px; box-shadow: 0 4px 0 #1f6391; touch-action: none; }
  
  .dropzone-container { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
  .slot-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; width: auto; }
  .slot-label { font-size: 10px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
  
  .slot { width: 140px; min-height: 50px; border: 3px dashed #bdc3c7; border-radius: 10px; background: var(--gray); display: flex; align-items: center; justify-content: center; position: relative; }
  .slot.error-highlight { border-color: var(--secondary); background: #ff7675; }
  .slot .draggable { width: 100%; height: 100%; box-shadow: none; }

  /* Knoppen & Overlay */
  .btn { display: block; margin: 20px auto; padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
  #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.98); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; text-align: center; padding: 20px; }
  #timer-container { width: 250px; height: 12px; background: white; border-radius: 10px; margin-top: 20px; overflow: hidden; }
  #timer-fill { height: 100%; background: var(--secondary); width: 0%; }
</style>
</head>
<body>

<div class="container">
  <h1>👑 Het Verloren Koninkrijk</h1>

  <div id="section-map" class="section active">
    <h2>Opdracht 1: De Grensnamen</h2>
    <div class="map-container">
      <div class="map-slot-box" id="pos-Nederland">
        <div class="slot geografisch-slot" data-answer="Noordelijke Nederlanden">❓</div>
        <select class="map-select" id="sel-Nederland" data-answer="Noordelijke Nederlanden">
          <option value="">-- Kies --</option>
          <option value="Noordelijke Nederlanden">Noordelijke Ned.</option>
          <option value="Zuidelijke Nederlanden">Zuidelijke Ned.</option>
          <option value="Luxemburg">Luxemburg</option>
        </select>
      </div>
      <div class="map-slot-box" id="pos-Belgie">
        <div class="slot geografisch-slot" data-answer="Zuidelijke Nederlanden">❓</div>
        <select class="map-select" id="sel-Belgie" data-answer="Zuidelijke Nederlanden">
          <option value="">-- Kies --</option>
          <option value="Noordelijke Nederlanden">Noordelijke Ned.</option>
          <option value="Zuidelijke Nederlanden">Zuidelijke Ned.</option>
          <option value="Luxemburg">Luxemburg</option>
        </select>
      </div>
      <div class="map-slot-box" id="pos-Luxemburg">
        <div class="slot geografisch-slot" data-answer="Luxemburg">❓</div>
        <select class="map-select" id="sel-Luxemburg" data-answer="Luxemburg">
          <option value="">-- Kies --</option>
          <option value="Noordelijke Nederlanden">Noordelijke Ned.</option>
          <option value="Zuidelijke Nederlanden">Zuidelijke Ned.</option>
          <option value="Luxemburg">Luxemburg</option>
        </select>
      </div>
    </div>

    <div class="map-bank-wrapper" id="map-bank">
      <div class="item-bank">
        <div class="draggable" draggable="true" data-value="Noordelijke Nederlanden">Noordelijke Nederlanden</div>
        <div class="draggable" draggable="true" data-value="Zuidelijke Nederlanden">Zuidelijke Nederlanden</div>
        <div class="draggable" draggable="true" data-value="Luxemburg">Luxemburg</div>
      </div>
    </div>
    <button class="btn" onclick="checkMap()">Controleer Kaart ✔️</button>
  </div>

  <div id="section-timeline" class="section">
    <h2>Opdracht 2: De Tijdlijn</h2>
    <div class="item-bank" id="tl-bank"></div>
    <div class="dropzone-container" id="tl-zones"></div>
    <button class="btn" onclick="checkTimeline()">Controleer Tijdlijn ✔️</button>
  </div>

  <div id="section-words" class="section">
    <h2>Opdracht 3: De Geheime Vraag</h2>
    <div class="item-bank" id="w-bank"></div>
    <div class="dropzone-container" id="w-zones"></div>
    <button class="btn" id="btn-sentence" onclick="checkSentence()">Zin Controleren ✔️</button>
    <div id="year-section" style="display:none; text-align:center;">
      <input type="number" id="year-input" style="font-size:24px; width:120px; text-align:center; border: 3px solid var(--primary); border-radius:10px;" placeholder="????">
      <button class="btn" onclick="checkFinalCode()">Code Invoeren 🔓</button>
    </div>
  </div>

  <div id="section-end" class="section" style="text-align:center">
      <h1 style="color: var(--success);">GEFELICITEERD! 🔓</h1>
      <div style="background: #f1f2f6; padding: 20px; border-radius: 20px; border: 5px solid var(--success);">
        <div style="font-size: 50px; font-weight: bold;">1815</div>
        <p style="font-weight: bold; color: var(--secondary);">🛑 STEEK JE VINGER IN DE LUCHT! ☝️</p>
      </div>
  </div>
</div>

<div id="overlay">
  <h2 id="overlay-head">Niet goed... ❌</h2>
  <p id="overlay-msg">Wacht heel even.</p>
  <div id="timer-container"><div id="timer-fill"></div></div>
</div>

<script>
  const tlCorrect = ["verlichting", "de val van Napoleon", "Congres van Wenen", "Willem I word koning", "De val van de BeNeLux"];
  const sentCorrect = ["In", "welk", "jaar", "ontstond", "het", "Verenigd", "Koninkrijk", "der", "Nederlanden?"];
  const fakes = ["Willem", "revolutie", "opstand", "soevereine", "scheiding", "Belgische"];

  let draggedItem = null;
  let fails = { map: 0, tl: 0, sent: 0, year: 0 };

  function initDragDrop() {
    document.querySelectorAll('.draggable').forEach(el => {
      el.addEventListener('dragstart', function() { draggedItem = this; this.style.opacity = '0.4'; });
      el.addEventListener('dragend', function() { this.style.opacity = '1'; draggedItem = null; });
      el.addEventListener('touchstart', function(e) { draggedItem = this; this.style.opacity = '0.4'; }, {passive: true});
      el.addEventListener('touchend', function(e) {
        this.style.opacity = '1';
        let touch = e.changedTouches[0];
        let target = document.elementFromPoint(touch.clientX, touch.clientY);
        let zone = target ? target.closest('.slot, .item-bank') : null;
        if (zone) handleDrop(zone);
        draggedItem = null;
      });
    });

    document.querySelectorAll('.slot, .item-bank').forEach(zone => {
      zone.addEventListener('dragover', e => e.preventDefault());
      zone.addEventListener('drop', function(e) { e.preventDefault(); handleDrop(this); });
    });
  }

  function handleDrop(zone) {
    if (!draggedItem) return;
    if (zone.classList.contains('slot')) {
      const existing = Array.from(zone.children).find(c => c.classList.contains('draggable'));
      if (existing) {
        const bankId = zone.closest('.section').id === "section-timeline" ? "tl-bank" : "w-bank";
        document.getElementById(bankId).appendChild(existing);
      }
      zone.appendChild(draggedItem);
      zone.classList.remove('error-highlight');
    } else {
      zone.appendChild(draggedItem);
    }
  }

  function setup() {
    const tlB = document.getElementById('tl-bank');
    [...tlCorrect].sort(()=>Math.random()-0.5).forEach(t => {
      tlB.innerHTML += `<div class="draggable" draggable="true" data-value="${t}">${t}</div>`;
    });
    const tlZ = document.getElementById('tl-zones');
    tlCorrect.forEach((_, i) => {
      tlZ.innerHTML += `<div class="slot-wrapper"><span class="slot-label">Stap ${i+1}</span><div class="slot"></div></div>`;
    });

    const wB = document.getElementById('w-bank');
    [...sentCorrect, ...fakes].sort(()=>Math.random()-0.5).forEach(w => {
      wB.innerHTML += `<div class="draggable" draggable="true" data-value="${w}">${w}</div>`;
    });
    const wZ = document.getElementById('w-zones');
    sentCorrect.forEach((_, i) => {
      wZ.innerHTML += `<div class="slot-wrapper"><span class="slot-label">Deel ${i+1}</span><div class="slot" style="min-width:70px;"></div></div>`;
    });
    initDragDrop();
  }

  function checkMap() {
    let isMobile = window.innerWidth <= 600;
    let wrong = [];
    if(isMobile) {
      document.querySelectorAll('.map-select').forEach(s => {
        if(s.value !== s.dataset.answer) { wrong.push(s); s.style.borderColor = "var(--secondary)"; }
        else { s.style.borderColor = "var(--primary)"; }
      });
    } else {
      document.querySelectorAll('.geografisch-slot').forEach(s => {
        if(s.children[0]?.dataset.value !== s.dataset.answer) wrong.push(s);
      });
    }
    if(wrong.length === 0) show('section-timeline'); else { fails.map++; fail('map', wrong); }
  }

  function checkTimeline() {
    let wrong = [];
    document.querySelectorAll('#tl-zones .slot').forEach((s, i) => {
      const item = Array.from(s.children).find(c => c.classList.contains('draggable'));
      if(item?.dataset.value !== tlCorrect[i]) wrong.push(s);
    });
    if(wrong.length === 0) show('section-words'); else { fails.tl++; fail('tl', wrong); }
  }

  function checkSentence() {
    let wrong = [];
    document.querySelectorAll('#w-zones .slot').forEach((s, i) => {
      const item = Array.from(s.children).find(c => c.classList.contains('draggable'));
      if(item?.dataset.value !== sentCorrect[i]) wrong.push(s);
    });
    if(wrong.length === 0) {
      document.getElementById('btn-sentence').style.display = 'none';
      document.getElementById('year-section').style.display = 'block';
    } else { fails.sent++; fail('sent', wrong); }
  }

  function checkFinalCode() {
    if(document.getElementById('year-input').value === "1815") show('section-end'); else { fails.year++; fail('year', []); }
  }

  function fail(type, elements) {
    const o = document.getElementById('overlay');
    const bar = document.getElementById('timer-fill');
    o.style.display = 'flex';
    bar.style.transition = 'none'; bar.style.width = '0%';
    if(fails[type] >= 5) {
      document.getElementById('overlay-msg').innerText = "De fouten zijn nu gemarkeerd.";
      elements.forEach(el => el.classList.add('error-highlight'));
    }
    setTimeout(() => { bar.style.transition = 'width 5s linear'; bar.style.width = '100%'; }, 50);
    setTimeout(() => o.style.display = 'none', 5050);
  }

  function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  setup();
</script>
</body>
</html>
